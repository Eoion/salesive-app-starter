<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Salesive Notes</title>
        <style>
            /* Pre-React loading state: shown from first byte until JS mounts.
               React clears #root when it renders, hiding this automatically. */
            body { margin: 0; background: #fbf5ec; }
            #root-init {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
            }
            #root-init .ring {
                width: 32px;
                height: 32px;
                border: 3px solid #e0c9a6;
                border-top-color: #7a5230;
                border-radius: 50%;
                animation: spin 0.65s linear infinite;
            }
            @keyframes spin { to { transform: rotate(360deg); } }
        </style>
    </head>
    <body>
        <div id="root">
            <div id="root-init"><div class="ring"></div></div>
        </div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
